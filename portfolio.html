// ─────────────────────────────────────────────
//  Toggle contributions
// ─────────────────────────────────────────────
function toggleContrib(id, btn) {
    const el = document.getElementById("contrib-" + id);
    const open = el.classList.toggle("open");
    btn.textContent = open ? "– contributions" : "+ contributions";
}

// ─────────────────────────────────────────────
//  App state
// ─────────────────────────────────────────────
let activeTags = new Set();
let activeOrgs = new Set();
let sortMode = "effort-desc";

// Derive all unique tags and orgs from data
const allTags = [...new Set(PROJECTS.flatMap(p => p.tags))].sort();
const allOrgs = [...new Set(PROJECTS.map(p => p.organization).filter(Boolean))].sort();

// ─────────────────────────────────────────────
//  Render controls
// ─────────────────────────────────────────────
function buildPills(containerId, items, activeSet, onToggle) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";
    items.forEach(item => {
        const pill = document.createElement("button");
        pill.className = "pill" + (activeSet.has(item) ? " active" : "");
        pill.textContent = item;
        pill.addEventListener("click", () => onToggle(item));
        container.appendChild(pill);
    });
}

function initControls() {
    buildPills("tag-filters", allTags, activeTags, tag => {
        activeTags.has(tag) ? activeTags.delete(tag) : activeTags.add(tag);
        buildPills("tag-filters", allTags, activeTags, arguments.callee);
        renderProjects();
    });

    buildPills("org-filters", allOrgs, activeOrgs, org => {
        activeOrgs.has(org) ? activeOrgs.delete(org) : activeOrgs.add(org);
        buildPills("org-filters", allOrgs, activeOrgs, arguments.callee);
        renderProjects();
    });

    document.getElementById("sort-select").addEventListener("change", e => {
        sortMode = e.target.value;
        renderProjects();
    });
}

// ─────────────────────────────────────────────
//  Filter + sort
// ─────────────────────────────────────────────
function getFiltered() {
    return PROJECTS.filter(p => {
        if (activeTags.size > 0 && ![...activeTags].every(t => p.tags.includes(t))) return false;
        if (activeOrgs.size > 0 && !activeOrgs.has(p.organization)) return false;
        return true;
    });
}

function getSorted(projects) {
    return [...projects].sort((a, b) => {
        if (sortMode === "effort-desc") return b.effort - a.effort;
        if (sortMode === "effort-asc") return a.effort - b.effort;
        if (sortMode === "date-desc") return new Date(b.startDate) - new Date(a.startDate);
        if (sortMode === "date-asc") return new Date(a.startDate) - new Date(b.startDate);
        if (sortMode === "title-asc") return a.title.localeCompare(b.title);
        return 0;
    });
}

// ─────────────────────────────────────────────
//  Render projects
// ─────────────────────────────────────────────
function effortDots(n) {
    let html = '<div class="effort-dots" title="Effort: ' + n + '/5">';
    for (let i = 1; i <= 5; i++) {
        html += '<div class="dot' + (i <= n ? " filled" : "") + '"></div>';
    }
    html += "</div>";
    return html;
}

function formatDate(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    return d.toLocaleDateString("en-US", { month: "short", year: "numeric" });
}

function renderProjects() {
    const filtered = getFiltered();
    const sorted = getSorted(filtered);

    const meta = document.getElementById("results-meta");
    meta.textContent = sorted.length + " of " + PROJECTS.length + " projects";

    const list = document.getElementById("project-list");
    if (sorted.length === 0) {
        list.innerHTML = '<div class="no-results">No projects match the selected filters.</div>';
        return;
    }

    list.innerHTML = sorted.map(p => {
        const metaBadges = [
            '<span class="meta-badge">' + formatDate(p.startDate) + "</span>",
            p.organization ? '<span class="meta-badge org">' + p.organization + "</span>" : "",
            p.mentor ? '<span class="meta-badge mentor">Mentor: ' + p.mentor + "</span>" : ""
        ].filter(Boolean).join("");

        const tags = p.tags.map(t =>
            '<span class="tag">' + t + "</span>"
        ).join("");

        const links = p.links.length > 0
            ? '<div class="project-links">' + p.links.map(l =>
                '<a href="' + l.href + '" target="_blank">' + l.label + "</a>"
              ).join("") + "</div>"
            : "";

        const contributionsHtml = p.contributions && p.contributions.length > 0
            ? `<div class="contributions" id="contrib-${p.id}">
                <ul>${p.contributions.map(c => '<li>' + c + '</li>').join("")}</ul>
               </div>
               <button class="read-more-btn" onclick="toggleContrib('${p.id}', this)">+ contributions</button>`
            : "";

        return `
        <div class="project-card">
            <div class="project-header">
                <div class="project-title">${p.title}</div>
                ${effortDots(p.effort)}
            </div>
            <div class="project-meta">${metaBadges}</div>
            <p class="project-desc">${p.description}</p>
            <div class="project-tags">${tags}</div>
            ${links}
            ${contributionsHtml}
        </div>`;
    }).join("");
}

// ─────────────────────────────────────────────
//  Scroll progress
// ─────────────────────────────────────────────
window.onscroll = () => {
    const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    document.getElementById("myBar").style.width = (winScroll / height * 100) + "%";
};

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
initControls();
renderProjects();
</script>
